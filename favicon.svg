<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Rounded square background -->
  <rect width="100" height="100" rx="24" ry="24" fill="url(#bg)"/>
  <!-- Inner highlight -->
  <rect width="100" height="100" rx="24" ry="24" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  <!-- Inner glow top -->
  <ellipse cx="28" cy="22" rx="32" ry="20" fill="rgba(255,255,255,0.13)"/>
  <!-- SR text -->
  <text x="50" y="67"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="48"
        font-weight="700"
        fill="white"
        text-anchor="middle"
        letter-spacing="-1"
        filter="url(#glow)">SR</text>
  <!-- Corner dot -->
  <circle cx="80" cy="80" r="5" fill="rgba(255,255,255,0.3)"/>
</svg>
