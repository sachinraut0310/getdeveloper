<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 110" width="420" height="110">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#7c3aed" flood-opacity="0.35"/>
    </filter>
    <linearGradient id="dotGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0e7490;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Icon Badge -->
  <g transform="translate(10, 10)" filter="url(#shadow)">
    <rect width="90" height="90" rx="22" ry="22" fill="url(#grad1)"/>
    <rect width="90" height="90" rx="22" ry="22" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
    <ellipse cx="22" cy="18" rx="28" ry="18" fill="rgba(255,255,255,0.12)"/>
    <text x="45" y="60"
          font-family="'Georgia', 'Times New Roman', serif"
          font-size="44" font-weight="700"
          fill="white" text-anchor="middle"
          letter-spacing="-1"
          filter="url(#glow)">SR</text>
    <circle cx="72" cy="72" r="5" fill="rgba(255,255,255,0.3)"/>
  </g>

  <!-- Divider line -->
  <line x1="118" y1="22" x2="118" y2="88"
        stroke="url(#dotGrad)" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

  <!-- Text block -->
  <g transform="translate(132, 10)">
    <!-- Name — gradient purple to cyan (visible on both dark & light) -->
    <text y="46"
          font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
          font-size="32" font-weight="800"
          letter-spacing="-0.5"
          fill="url(#nameGrad)">Sachin Raut</text>

    <!-- Tagline — gradient purple to cyan -->
    <text y="68"
          font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
          font-size="13" font-weight="600"
          letter-spacing="3"
          fill="url(#dotGrad)"
          opacity="0.9">WEB DEVELOPER &amp; QA SPECIALIST</text>

    <!-- Decorative dots -->
    <g transform="translate(0, 82)">
      <circle cx="0"  cy="0" r="2.5" fill="url(#dotGrad)" opacity="0.7"/>
      <circle cx="10" cy="0" r="2.5" fill="url(#dotGrad)" opacity="0.5"/>
      <circle cx="20" cy="0" r="2.5" fill="url(#dotGrad)" opacity="0.3"/>
    </g>
  </g>
</svg>
